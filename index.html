<script>
    const API_URL = 'https://TU_ID.execute-api.us-east-2.amazonaws.com/estados';

    async function obtenerDatos() {
        try {
            const response = await fetch(API_URL);
            
            if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
            
            const items = await response.json();
            const tableBody = document.querySelector("#tabla-estados tbody");
            tableBody.innerHTML = "";

            items.forEach(function(item) {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${item.Estado || 'N/A'}</td>
                    <td>${item.Temperatura || '0'}°C</td>
                    <td>${item.Humedad || '0'}%</td>
                    <td>$${item.Costo_Alojamiento || '0'}</td>
                `;
                tableBody.appendChild(row);
            });

        } catch (error) {
            console.error("Error al obtener datos:", error);
            document.querySelector("#tabla-estados tbody").innerHTML = 
                `<tr><td colspan="4" style="color:red">Error al cargar datos: ${error.message}</td></tr>`;
        }
    }

    window.onload = obtenerDatos;
</script>
