version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - pip install boto3

  build:
    commands:
      - python3 procesar.py

  post_build:
    commands:
      - if [ -f resultado.txt ]; then cat resultado.txt; else echo "No se generó resultado.txt"; fi
      - aws s3 cp index.html s3://automatizacion-tecmilenio/index.html --content-type "text/html"

artifacts:
  files:
    - '**/*'