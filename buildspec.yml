version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
  build:
    commands:
      - echo "Ejecutando el script de procesamiento..."
      - python3 procesar.py
  post_build:
    commands:
      - echo "Validando que el archivo resultado.txt fue generado correctamente..."
      - |
        if [ -f resultado.txt ]; then 
          echo "Validacion exitosa: archivo encontrado"; 
        else 
          echo "Error: resultado.txt no existe" && exit 1; 
        fi

artifacts:
  files:
    - '**/*'