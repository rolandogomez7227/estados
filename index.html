<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1350.0.min.js"></script>
<script>
    // 1. CONFIGURACIÓN DE CREDENCIALES (Cópialas de AWS Details -> CLI)
    AWS.config.update({
        region: 'us-east-2',
        accessKeyId: 'TU_ACCESS_KEY_ID',
        secretAccessKey: 'TU_SECRET_ACCESS_KEY',
        sessionToken: 'TU_SESSION_TOKEN_MUY_LARGO' // ¡Este es obligatorio!
    });

    const docClient = new AWS.DynamoDB.DocumentClient();

    function obtenerDatos() {
        const params = {
            TableName: "EstadosTabla" // Asegúrate que se llame exactamente así
        };

        docClient.scan(params, function(err, data) {
            if (err) {
                console.error("Error al leer de DynamoDB:", err);
                alert("Error de conexión: Revisa tus credenciales");
            } else {
                console.log("Datos recibidos:", data);
                const tableBody = document.querySelector("#tabla-estados tbody");
                
                // Limpiamos la tabla por si acaso
                tableBody.innerHTML = "";

                data.Items.forEach(function(item) {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${item.Estado || 'N/A'}</td>
                        <td>${item.Temperatura || '0'}°C</td>
                        <td>${item.Humedad || '0'}%</td>
                        <td>$${item.Costo_Alojamiento || '0'}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }
        });
    }

    // Ejecutar la función al cargar la página
    window.onload = obtenerDatos;
</script>
