version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
  build:
    commands:
      - echo "Ejecutando el script de procesamiento..."
      - python3 procesar.py
  post_build:
    commands:
      - echo "Validando que el archivo resultado.txt fue generado correctamente..."
      - test -f resultado.txt && echo "Archivo encontrado" || (echo "Error: archivo no generado" && exit 1)

artifacts:
  files:
    - '**/*'